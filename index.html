<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crit Chance Calculator</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        input {
            width: 100px;
            margin: 3px;
        }
        table {
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: center;
        }
        button {
            margin-top: 10px;
            padding: 6px 12px;
        }
    </style>
</head>
<body>

<h2>Crit Chance Calculator</h2>

<div>
    n (trials): <input id="n" value="7"><br>
    Crit Base: <input id="BC"><br>
    CritRes Base: <input id="BCR"><br>
    Crit from equipment: <input id="X"><br>
    Crit from skill: <input id="Y"><br>
    Crit Buff (%): <input id="CP"><br>
    Crit Debuff (%): <input id="DCRP"><br>
</div>

<p id="cc">Crit Chance (p) = -</p>

<button id="modeToggle">Switch to Raw Mode</button>

<table id="resultTable">
    <thead>
        <tr>
            <th>k/n</th>
            <th>P(X = k)</th>
            <th>1 in X (= k)</th>
            <th>n for P(X = k) ≥ 99%</th>
            <th>P(X ≥ k)</th>
            <th>1 in X (≥ k)</th>
            <th>n for P(X ≥ k) ≥ 99%</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const CRIT_CONST = 2000 / 3;

let mode = "pretty";

document.getElementById("modeToggle").addEventListener("click", () => {
    mode = mode === "pretty" ? "raw" : "pretty";
    document.getElementById("modeToggle").innerText =
        mode === "pretty" ? "Switch to Raw Mode" : "Switch to Pretty Mode";
    calculate();
});

const inputs = document.querySelectorAll("input");
inputs.forEach(input => {
    input.addEventListener("input", calculate);
});

function getFloat(id) {
    const val = document.getElementById(id).value.trim();
    if (val === "") return null;
    const num = Number(val);
    return isNaN(num) ? null : num;
}

function comb(n, k) {
    if (k < 0 || k > n) return 0;
    if (k > n - k) k = n - k;

    let res = 1;
    for (let i = 1; i <= k; i++) {
        res *= (n - (k - i));
        res /= i;
    }
    return res;
}

function binomialProb(n, k, p) {
    return comb(n, k) * (p ** k) * ((1 - p) ** (n - k));
}

function formatRaw(value, decimals = 16) {
    if (!isFinite(value)) return "∞";
    let str = value.toFixed(decimals);
    str = str.replace(/\.?0+$/, "");
    let [intPart, decPart] = str.split(".");
    intPart = Number(intPart).toLocaleString("en-US");
    return decPart ? `${intPart}.${decPart}` : intPart;
}

function toSuperscript(num) {
    const map = {
        "0":"⁰","1":"¹","2":"²","3":"³","4":"⁴",
        "5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹",
        "-":"⁻"
    };

    return num.toString().split("")
        .map(ch => map[ch] || ch)
        .join("");
}

function formatScientific3(value) {
    if (!isFinite(value)) return "∞";
    if (value === 0) return "0";

    const exponent = Math.floor(Math.log10(value));
    const base = value / (10 ** exponent);

    const roundedBase = Number(base.toFixed(3));

    return roundedBase + " × 10" + toSuperscript(exponent);
}

function formatPrettyProbability(p) {
    if (!isFinite(p)) return "∞";
    if (p === 0) return "0%";

    const percent = p * 100;

    if (percent >= 0.001) {
        return percent.toFixed(3) + "%";
    }

    const exponent = Math.floor(Math.log10(percent));
    const base = percent / (10 ** exponent);
    const roundedBase = Number(base.toFixed(3));

    return roundedBase + " × 10" + toSuperscript(exponent) + " %";
}

function formatPrettyOneIn(value) {
    if (!isFinite(value)) return "∞";

    if (value < 100000) {
        return value.toLocaleString("en-US", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    return formatScientific3(value);
}

function formatPrettyTrials(value) {
    if (!isFinite(value)) return "∞";

    if (value < 1000000) {
        return value.toLocaleString("en-US", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
    }

    const exponent = Math.floor(Math.log10(value));
    const base = value / (10 ** exponent);
    const roundedBase = Number(base.toFixed(3));

    return roundedBase + " × 10" + toSuperscript(exponent);
}

function calculateCritChance(BC, BCR, X, Y, CP, DCRP) {
    let C  = (BC + X) * (1 + CP / 100) + Y;
    let CR = BCR * (1 - DCRP / 100);
    let FC = C - CR;

    if (FC + CRIT_CONST === 0) return null;

    let CC = FC / (FC + CRIT_CONST);
    if (CC < 0) CC = 0;
    if (CC > 1) CC = 1;

    return CC;
}

function calculate() {

    const n    = getFloat("n");
    const BC   = getFloat("BC");
    const BCR  = getFloat("BCR");
    const X    = getFloat("X") ?? 0;
    const Y    = getFloat("Y") ?? 0;
    const CP   = getFloat("CP") ?? 0;
    const DCRP = getFloat("DCRP") ?? 0;

    const ccText = document.getElementById("cc");
    const tbody = document.querySelector("#resultTable tbody");
    tbody.innerHTML = "";

    if (
        n === null || BC === null || BCR === null ||
        n <= 0 || BC <= 0 || BCR <= 0
    ) {
        ccText.innerText = "Crit Chance (p) = -";
        return;
    }

    const p = calculateCritChance(BC, BCR, X, Y, CP, DCRP);
    if (p === null) {
        ccText.innerText = "Crit Chance (p) = -";
        return;
    }

    ccText.innerText =
        mode === "pretty"
            ? `Crit Chance (p) = ${formatPrettyProbability(p)}`
            : `Crit Chance (p) = ${formatRaw(p)}`;

    const exact = [];
    for (let k = 0; k <= n; k++) {
        exact.push(binomialProb(n, k, p));
    }

    const cumulative = [];
    let sum = 0;
    for (let i = n; i >= 0; i--) {
        sum += exact[i];
        cumulative[i] = sum;
    }

    for (let k = 0; k <= n; k++) {

        const probExact = exact[k];
        const probCum   = cumulative[k];
        const minTrialsExact = probExact > 0 ? Math.log(0.01) / Math.log(1 - probExact): Infinity;
        const minTrialsCum = probCum > 0 ? Math.log(0.01) / Math.log(1 - probCum) : Infinity;
        const invExact = probExact > 0 ? 1 / probExact : Infinity;
        const invCum   = probCum > 0 ? 1 / probCum : Infinity;

        let displayExact, displayCum, displayInvExact, displayInvCum, displayminTrialsExact, displayCumTrials;

        if (mode === "pretty") {
            displayExact = formatPrettyProbability(probExact);
            displayCum   = formatPrettyProbability(probCum);
            displayInvExact = formatPrettyOneIn(invExact);
            displayInvCum   = formatPrettyOneIn(invCum);
            displayminTrialsExact = formatPrettyTrials(minTrialsExact);
            displayCumTrials = formatPrettyTrials(minTrialsCum);
        } else {
            displayExact = formatRaw(probExact);
            displayCum   = formatRaw(probCum);
            displayInvExact = formatRaw(invExact, 2);
            displayInvCum   = formatRaw(invCum, 2);
            displayminTrialsExact = formatRaw(minTrialsExact, 2);
            displayCumTrials = formatRaw(minTrialsCum, 2);
        }

        const row = `
            <tr>
                <td>${k}/${n}</td>
                <td>${displayExact}</td>
                <td>${displayInvExact}</td>
                <td>${displayminTrialsExact}</td>
                <td>${displayCum}</td>
                <td>${displayInvCum}</td>
                <td>${displayCumTrials}</td>
            </tr>
        `;
        tbody.innerHTML += row;
    }
}
</script>

</body>
</html>
